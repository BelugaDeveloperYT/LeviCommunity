<h1>Support</h1>

<p>Need help? Create a support ticket on GitHub.</p>

<p>
    <a href="https://github.com/USERNAME/REPOSITORY/issues/new">
        Open a Support Ticket
    </a>
</p>

<h2>Feedback</h2>

<p>
    After your issue is resolved, we'd appreciate your feedback.
</p>

<form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
    <label>Your Name</label><br>
    <input type="text" name="name"><br><br>

    <label>Support Ticket #</label><br>
    <input type="text" name="ticket"><br><br>

    <label>Rating</label><br>
    <select name="rating">
        <option>Excellent</option>
        <option>Good</option>
        <option>Average</option>
        <option>Poor</option>
    </select><br><br>

    <label>Comments</label><br>
    <textarea name="comments"></textarea><br><br>

    <button type="submit">Send Feedback</button>
</form>

</body>
</html>
